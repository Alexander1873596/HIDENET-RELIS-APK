name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Unzip
        run: unzip HIDENET_SUPER_FINAL.zip -d temp

      - name: Find project folder
        run: |
          cd temp
          DIR=$(find . -name gradlew -type f | head -n 1 | sed 's/\/gradlew//')
          mv $DIR/* ../
          cd ..

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Give permission
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: APK
          path: app/build/outputs/apk/debug/*.apk
